# Primary UI: Streamlit Cloud (https://ai-car-concierge.streamlit.app)
services:
  - type: web
    name: ai-car-concierge-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_TO_EMAIL
        sync: false
      - key: API_KEY
        sync: false
      - key: CHAT_RATE_LIMIT
        value: 30/minute
      - key: CORS_ORIGINS
        value: https://ai-car-concierge.streamlit.app
