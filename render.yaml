services:
  - type: web
    name: ai-car-concierge-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_TO_EMAIL
        sync: false
      - key: API_KEY
        sync: false
      - key: CHAT_RATE_LIMIT
        value: 30/minute
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: ai-car-concierge-ui
    runtime: docker
    dockerfilePath: ./Dockerfile.streamlit
    healthCheckPath: /
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://ai-car-concierge-a073.onrender.com
      - key: API_KEY
        sync: false
